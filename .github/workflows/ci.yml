# .github/workflows/ci.yml
name: CI Pipeline

# ── When to run ──────────────────────────────────────
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# ── Jobs ─────────────────────────────────────────────
jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest        # free Linux VM

    steps:
      # 1. Check out your code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install the JDK
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven              # caches ~/.m2 for faster builds

      # 3. Install JavaFX native libs (needed on headless Linux)
      - name: Install JavaFX system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libglu1-mesa libasound2t64 \
            libxtst6 libx11-6 libxrender1 libxxf86vm1

      # 4. Run all tests with headless JavaFX mode
      - name: Run tests
        run: |
          mvn clean test \git push origin
            -Dglass.platform=Monocle \
            -Dmonocle.platform=Headless \
            -Dprism.order=sw
        env:
          DISPLAY: ':99'

      # 5. (Optional) Upload test reports if tests fail
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

      # 6. (Optional) Build the full JAR to verify compilation
      - name: Build JAR
        run: mvn package -DskipTests